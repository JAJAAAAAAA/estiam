# =============================================================================
#  Pipeline DevSecOps - GitHub Actions
# =============================================================================
#  Ce workflow met en oeuvre les pratiques DevSecOps demandées dans le projet :
#    1. Lint du Dockerfile (hadolint)
#    2. Lint des manifests Kubernetes (yamllint + kube-linter)
#    3. Build de l'image Docker
#    4. Scan des dependances Python (Trivy filesystem)
#    5. Scan de l'image Docker (Trivy image)
#    6. Verification de la politique de securite (Conftest / Rego)
#
#  Declenchement : sur push, sur pull request, et manuellement via l'UI.
# =============================================================================

name: DevSecOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # permet de lancer le pipeline a la main depuis l'onglet Actions

# Permissions minimales accordees au GITHUB_TOKEN (principe du moindre privilege)
permissions:
  contents: read
  security-events: write    # necessaire pour publier les rapports SARIF dans l'onglet Security

env:
  IMAGE_NAME: devsecops-demo-api
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ---------------------------------------------------------------------------
  # Job 1 : Lint du Dockerfile
  # ---------------------------------------------------------------------------
  lint-dockerfile:
    name: Lint Dockerfile (hadolint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Analyse du Dockerfile avec hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # On ne casse pas le pipeline pour des warnings, juste les erreurs
          failure-threshold: error

  # ---------------------------------------------------------------------------
  # Job 2 : Lint des fichiers YAML Kubernetes
  # ---------------------------------------------------------------------------
  lint-yaml:
    name: Lint YAML (yamllint + kube-linter)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de yamllint
        run: pip install yamllint

      - name: Execution de yamllint sur le dossier k8s
        run: |
          yamllint -d "{extends: default, rules: {line-length: {max: 160}}}" k8s/

      - name: Verification avec kube-linter
        uses: stackrox/kube-linter-action@v1.0.4
        with:
          directory: k8s/
        # kube-linter detecte des dizaines de mauvaises pratiques K8s
        # (run as root, no resource limits, latest tag, etc.)
        continue-on-error: true   # on documente les findings sans bloquer le pipeline

  # ---------------------------------------------------------------------------
  # Job 3 : Build de l'image Docker
  # ---------------------------------------------------------------------------
  build-image:
    name: Build de l'image Docker
    runs-on: ubuntu-latest
    needs: [lint-dockerfile]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Mise en place de Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true                # charge l'image dans le runner pour qu'elle soit scannable
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Sauvegarde de l'image en artefact (pour le job de scan)
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o /tmp/image.tar

      - name: Upload de l'image en artefact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 4 : Scan des dependances applicatives (Trivy filesystem)
  # ---------------------------------------------------------------------------
  scan-dependencies:
    name: Scan des dependances (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Trivy filesystem scan (requirements.txt)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          severity: HIGH,CRITICAL
          format: table
          exit-code: '0'           # on rapporte sans bloquer
          ignore-unfixed: false

      - name: Trivy filesystem scan (export SARIF pour onglet Security)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app/
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'

      - name: Upload du rapport SARIF dans GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ---------------------------------------------------------------------------
  # Job 5 : Scan de l'image Docker (Trivy image)
  # ---------------------------------------------------------------------------
  scan-image:
    name: Scan de l'image Docker (Trivy)
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Telechargement de l'artefact image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Rechargement de l'image dans le daemon Docker
        run: docker load -i /tmp/image.tar

      - name: Trivy image scan (table dans les logs)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: '0'
          ignore-unfixed: false

      - name: Trivy image scan (export SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'

      - name: Upload du rapport SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ---------------------------------------------------------------------------
  # Job 6 : Politique de securite Conftest / Rego (BONUS du projet)
  # ---------------------------------------------------------------------------
  policy-check:
    name: Politique Conftest (Rego)
    runs-on: ubuntu-latest
    needs: [lint-yaml]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Conftest
        run: |
          CONFTEST_VERSION=0.56.0
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/
          conftest --version

      - name: Execution de Conftest sur les manifests K8s
        run: |
          set +e
          conftest test --policy policy/ k8s/
          RESULT=$?
          echo "Code de retour Conftest : $RESULT"
          # On documente la violation mais on ne casse pas le pipeline
          # afin que tous les jobs puissent terminer pour le rapport.
          exit 0
