# Manifest Kubernetes volontairement vulnérable :
#   - securityContext.runAsUser = 0  (root)
#   - allowPrivilegeEscalation non défini
#   - pas de readOnlyRootFilesystem
# => La règle Conftest doit le rejeter.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops-demo-api
  labels:
    app: devsecops-demo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devsecops-demo-api
  template:
    metadata:
      labels:
        app: devsecops-demo-api
    spec:
      containers:
        - name: api
          image: ghcr.io/USER/devsecops-demo-api:latest
          ports:
            - containerPort: 5000
          securityContext:
            runAsUser: 0   # <-- VIOLATION : root
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
